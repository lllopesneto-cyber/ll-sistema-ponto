<!-- Blobs orgânicos de fundo — identidade LL -->
<div class="bg-blob bg-blob-1" aria-hidden="true"></div>
<div class="bg-blob bg-blob-2" aria-hidden="true"></div>
<div class="bg-grad" aria-hidden="true"></div>

<div class="terminal">

  <header style="text-align:center">
    <a class="ll-brand" href="#">
      <svg class="ll-mark" viewBox="0 0 628 670" fill="none" aria-label="LL Audiovisual">
        <use href="#ll-logo"/>
      </svg>
      <div class="ll-wordmark">
        <span class="ll-name">LL</span>
        <span class="ll-sub">Audiovisual</span>
      </div>
    </a>
    <div class="t-clock" id="clock">00:00</div>
    <div class="t-date"  id="date">—</div>
  </header>

  <!-- PIN screen -->
  <div id="pin-screen">
    <p class="pin-label">Digite seu PIN para registrar ponto</p>
    <div class="pin-dots" id="pin-dots">
      <span></span><span></span><span></span><span></span>
    </div>

    <div class="keypad">
      <button class="key" data-d="1">1</button>
      <button class="key" data-d="2">2</button>
      <button class="key" data-d="3">3</button>
      <button class="key" data-d="4">4</button>
      <button class="key" data-d="5">5</button>
      <button class="key" data-d="6">6</button>
      <button class="key" data-d="7">7</button>
      <button class="key" data-d="8">8</button>
      <button class="key" data-d="9">9</button>
      <button class="key key-delete" id="key-del">⌫</button>
      <button class="key" data-d="0">0</button>
      <button class="key key-confirm" id="key-ok">✓</button>
    </div>
  </div>

  <!-- Result screen -->
  <div id="result-screen" class="hidden">
    <div class="result-card" id="res-card">
      <div class="res-icon"    id="res-icon">✓</div>
      <div class="res-name"    id="res-name"></div>
      <div class="res-action"  id="res-action"></div>
      <div class="res-time"    id="res-time"></div>
      <div class="res-worked"  id="res-worked"></div>
      <div class="res-balance" id="res-balance"></div>
    </div>
  </div>

  <!-- Error screen -->
  <div id="error-screen" class="hidden">
    <div class="result-card res-error">
      <div class="res-icon">✕</div>
      <div class="res-name">PIN inválido</div>
      <div class="res-action">Tente novamente</div>
    </div>
  </div>

  <!-- Loading screen -->
  <div id="loading-screen" class="hidden">
    <div class="result-card">
      <div class="res-icon">⏳</div>
      <div class="res-action">Processando...</div>
    </div>
  </div>

  <footer class="terminal-footer">
    <a href="/rh.html" class="rh-link">Painel RH →</a>
  </footer>

</div>

<script>
  function updateClock() {
    const now  = new Date();
    const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    const date = now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
    document.getElementById('clock').textContent = time;
    document.getElementById('date').textContent  = date.charAt(0).toUpperCase() + date.slice(1);
  }
  updateClock();
  setInterval(updateClock, 1000);

  let pin  = '';
  let busy = false;
  const dots    = document.getElementById('pin-dots').querySelectorAll('span');
  const screens = {
    pin:     document.getElementById('pin-screen'),
    result:  document.getElementById('result-screen'),
    error:   document.getElementById('error-screen'),
    loading: document.getElementById('loading-screen'),
  };

  function showOnly(name) {
    Object.entries(screens).forEach(([k, el]) => el.classList.toggle('hidden', k !== name));
  }
  function updateDots() {
    dots.forEach((d, i) => d.classList.toggle('filled', i < pin.length));
  }
  function addDigit(d) {
    if (busy || pin.length >= 4) return;
    pin += d;
    updateDots();
    if (pin.length === 4) submit();
  }
  function delDigit() {
    if (busy) return;
    pin = pin.slice(0, -1);
    updateDots();
  }
  function reset() {
    pin  = '';
    busy = false;
    updateDots();
    showOnly('pin');
  }
  function fmt(mins) {
    if (mins == null) return '';
    const s = mins < 0 ? '-' : (mins > 0 ? '+' : '');
    const a = Math.abs(mins);
    return `${s}${Math.floor(a/60)}h${String(a%60).padStart(2,'0')}min`;
  }
  function fmtTime(iso) {
    return new Date(iso).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  async function submit() {
    busy = true;
    showOnly('loading');
    try {
      const res  = await fetch('/api/ponto', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin })
      });
      const data = await res.json();
      if (!res.ok) { showError(); return; }

      const entrada = data.action === 'entrada';
      const card    = document.getElementById('res-card');
      card.className = 'result-card ' + (entrada ? 'res-entrada' : 'res-saida');

      document.getElementById('res-icon').textContent   = entrada ? '▶' : '■';
      document.getElementById('res-name').textContent   = data.name;
      document.getElementById('res-action').textContent = entrada ? 'Entrada registrada' : 'Saída registrada';
      document.getElementById('res-time').textContent   = fmtTime(data.time);

      const workedEl  = document.getElementById('res-worked');
      const balanceEl = document.getElementById('res-balance');

      workedEl.textContent = (!entrada && data.worked_minutes != null)
        ? `Trabalhado hoje: ${fmt(data.worked_minutes)}` : '';

      if (data.balance_month != null) {
        const b = data.balance_month;
        balanceEl.textContent = `Saldo do mês: ${fmt(b)}`;
        balanceEl.className   = 'res-balance ' + (b > 0 ? 'bal-pos' : b < 0 ? 'bal-neg' : 'bal-zero');
      } else {
        balanceEl.textContent = '';
      }

      showOnly('result');
      setTimeout(reset, 5000);
    } catch {
      showError();
    }
  }

  function showError() {
    showOnly('error');
    setTimeout(reset, 3000);
  }

  document.querySelectorAll('.key[data-d]').forEach(btn => {
    btn.addEventListener('click', () => addDigit(btn.dataset.d));
  });
  document.getElementById('key-del').addEventListener('click', delDigit);
  document.getElementById('key-ok').addEventListener('click', () => { if (pin.length === 4) submit(); });

  document.addEventListener('keydown', e => {
    if (e.key >= '0' && e.key <= '9') addDigit(e.key);
    else if (e.key === 'Backspace')    delDigit();
    else if (e.key === 'Enter' && pin.length === 4) submit();
  });
</script>
</body>
</html>
